<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Medicloud - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>


<body>
  <div class="login-container">
    <div class="login-header">
      <h1>Medicloud</h1>
      <p>Acceso Seguro a Documentos</p>
    </div>

    <!-- Mensaje de error (si falla login) -->
    <div id="loginError" style="display:none; margin-bottom:12px; color:#fecaca; font-weight:600;"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input id="username" type="text" placeholder="Ingrese su usuario" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="Ingrese su contraseña" required>
      </div>

      <button type="submit" class="btn-primary">Iniciar Sesión</button>

      <div class="demo">
        <strong>Credenciales demo:</strong><br>
        Admin: admin / admin123<br>
        Cliente: cliente1 / client123
      </div>
    </form>
  </div>

  <!-- IMPORTANTE: tiene que estar en la misma carpeta -->
  <script src="./app.js"></script>
  <script>
    // Si ya hay sesión, redirige al panel correspondiente
    (function () {
      const s = window.MedicloudAuth?.getSession?.();
      if (s?.role === 'admin') location.href = 'admin_dashboard.html';
      if (s?.role === 'client') location.href = 'client_dashboard.html';
    })();

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;

      const res = window.MedicloudAuth.login(u, p);

      const err = document.getElementById('loginError');
      if (!res.ok) {
        err.style.display = 'block';
        err.textContent = res.message || 'Error de login (demo).';
        return;
      }

      if (res.role === 'admin') location.href = 'admin_dashboard.html';
      if (res.role === 'client') location.href = 'client_dashboard.html';
    });
  </script>

    <div id="cookieBanner" class="cookie-banner">
    <p>
      Utilizamos cookies técnicas para garantizar el correcto funcionamiento del sitio.
      <a href="#" onclick="alert('Cookies técnicas necesarias para el funcionamiento.');">
        Más información
      </a>
    </p>
    <button id="acceptCookies" class="btn-primary">Aceptar</button>
  </div>
</body>
</html>
